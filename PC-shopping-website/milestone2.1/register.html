<!DOCTYPE html>
<head>
    <meta charset ="UTF-8">
    <title> Chip Ship store</title>
    <link rel="stylesheet" href="css_files/style.css">
    <link rel="stylesheet" href="css_files/register.css">

    <link rel="stylesheet" href="css_files/nav_style.css">
    <link rel="stylesheet" href="css_files/footer_style.css">
    
</head>

<body>
    
    <header class = "navbar">

        <div class = "navbar_left-side">

            <div class = "navbar_logo">
                <img src="images/logo.png" class = "logo">
                <p id = "storeName">chip Ship</p>
            </div>

          
        </div>

        

    </header>

    
    <main>

        <div class = "register_content">
            <div class="register_box">

    <h1>Create Account</h1>
    <p class="register_subtext">Join Chip Chip and start shopping!</p>

    <form class="register_form">

        <div class="input_group">
            <div class="name_row">

    <div class="input_group">
        <label>First Name</label>
        <input type="text" placeholder="First name" required>
    </div>

    <div class="input_group">
        <label>Last Name</label>
        <input type="text" placeholder="Last name" required>
    </div>

</div>

        </div>

        <div class="input_group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input_group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <div class="input_group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm your password" required>
        </div>

        <button type="submit" class="register_btn">Register</button>

        <p class="login_link">
             Already have an account? <a href="login.html">Login</a>
        </p>

    </form>

</div>


        </div>
        
    </main>
    

    

    <footer>
