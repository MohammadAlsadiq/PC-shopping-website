<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GameStore - Contact Us</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .contact-wrap { display:flex; gap:30px; padding:30px; flex-wrap:wrap; }
    .contact-form { flex:1; min-width:280px; }
    .contact-form input, .contact-form textarea { width:100%; padding:8px; margin-bottom:10px; background:#222; border:1px solid #444; color:#fff; }
    .map-wrap { flex:1; min-width:280px; min-height:350px; }
    .contact-info { margin-top:20px; color:#aaa; line-height:2; }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">🎮 GameStore</a>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Our Products</a></li>
    <li><a href="contact.html">About Us</a></li>
  </ul>
  <div class="nav-icons">
    <a href="#">🔍</a>
    <a href="cart.html">🛒 <span id="cart-count">0</span></a>
    <a href="admin/login.html">👤</a>
  </div>
</nav>

<div class="section"><h2>Contact Us</h2></div>

<div class="contact-wrap">
  <div class="contact-form">
    <h3 style="margin-bottom:15px;">Send a Message</h3>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea rows="5" placeholder="Your Message"></textarea>
    <button class="btn-primary">Send</button>
    <div class="contact-info">
      <p>📍 123 Gaming Street, City, Country</p>
      <p>📞 +1 234 567 8900</p>
      <p>✉️ support@gamestore.com</p>
    </div>
  </div>
  <div class="map-wrap">
    <!-- TODO: replace src with actual Google Maps embed link -->
    <iframe src="https://www.google.com/maps/embed" width="100%" height="100%" style="border:0;min-height:350px;" allowfullscreen loading="lazy"></iframe>
  </div>
</div>

<footer><p>&copy; 2025 GameStore. All rights reserved.</p></footer>
<script src="assets/js/main.js"></script>
</body>
</html>
