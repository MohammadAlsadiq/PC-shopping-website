<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GameStore - Cart</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .cart-wrap { padding:30px; }
    .cart-item { display:flex; align-items:center; gap:20px; background:#1a1a1a; padding:15px; margin-bottom:10px; }
    .cart-item img { width:80px; height:80px; object-fit:cover; background:#333; }
    .cart-item .info { flex:1; }
    .cart-item input { width:50px; padding:5px; background:#222; border:1px solid #444; color:#fff; }
    .cart-total { text-align:right; font-size:1.2rem; padding:15px 0; }
    .cart-actions { display:flex; gap:10px; justify-content:flex-end; }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">🎮 GameStore</a>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Our Products</a></li>
    <li><a href="contact.html">About Us</a></li>
  </ul>
  <div class="nav-icons">
    <a href="#">🔍</a>
    <a href="cart.html">🛒 <span id="cart-count">0</span></a>
    <a href="admin/login.html">👤</a>
  </div>
</nav>

<div class="cart-wrap">
  <h2 style="border-bottom:2px solid #cc0000;padding-bottom:10px;margin-bottom:20px;">Shopping Cart</h2>
  <div id="cart-items"><p style="color:#888;">Your cart is empty.</p></div>
  <div class="cart-total">Total: $<span id="cart-total">0.00</span></div>
  <div class="cart-actions">
    <button class="btn-secondary" onclick="clearCart()">Remove All</button>
    <a href="products.html" class="btn-secondary">Continue Shopping</a>
    <button class="btn-primary">Buy / Checkout</button>
  </div>
</div>

<footer><p>&copy; 2025 GameStore. All rights reserved.</p></footer>
<script src="assets/js/main.js"></script>
<script>
  function clearCart() { sessionStorage.removeItem('cart'); location.reload(); }
  // TODO: render cart items on page load and calculate total
</script>
</body>
</html>
