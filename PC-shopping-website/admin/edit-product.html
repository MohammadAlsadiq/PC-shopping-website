<div class="admin-content">
  <h1>Edit Product</h1>
  <form id="edit-form" style="max-width:500px;">
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="form-group">
      <label>Price ($)</label>
      <input type="number" id="price" name="price" step="0.01" required>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select name="category" id="category">
        <option>Custom Builds</option>
        <option>Gaming Monitors</option>
        <option>Graphic Cards</option>
        <option>Accessories</option>
      </select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="description" name="description" rows="4"></textarea>
    </div>
    <div class="form-group">
      <label>Replace Image (optional)</label>
      <input type="file" name="image" accept="image/*">
    </div>
    <button type="button" class="btn-submit" onclick="updateProduct()">Save Changes</button>
    <a href="dashboard.html" style="margin-left:15px;color:#aaa;">Cancel</a>
  </form>
</div>
