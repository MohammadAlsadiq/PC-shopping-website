<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chip Chip Store</title>

    <link rel="stylesheet" href="css_files/style.css">
    <link rel="stylesheet" href="css_files/profile.css">

    <link rel="stylesheet" href="css_files/nav_style.css">
    <link rel="stylesheet" href="css_files/footer_style.css">
</head>

<body>

    <header class="navbar">

        <div class="navbar_left-side">

            <div class="navbar_logo">
                <img src="images/logo.png"
                     class="logo"
                     alt="Chip Chip Logo">

                <p id="storeName">Chip Chip</p>
            </div>

        </div>

    </header>

    <main>

        <div class="profile_content">

            <div class="profile_box">

                <h1>My Profile</h1>

                <p class="profile_subtext">
                    Manage your account details
                </p>

                <form class="profile_form">

                    <!-- First + Last Name -->
                    <div class="name_row">

                        <div class="input_group">
                            <label>First Name</label>
                            <input type="text" value="">
                        </div>

                        <div class="input_group">
                            <label>Last Name</label>
                            <input type="text" value="">
                        </div>

                    </div>

                    <!-- Email -->
                    <div class="input_group">
                        <label>Email</label>
                        <input type="email" value="">
                    </div>

                    <!-- Phone -->
                    <div class="input_group">
                        <label>Phone Number</label>
                        <input type="tel" value="">
                    </div>

                    <!-- Address -->
                    <div class="input_group">
                        <label>Address</label>
                        <input type="text" value="">
                    </div>

                    <!-- Buttons -->
                    <div class="profile_actions">

                        <button type="submit" class="edit_btn">
                            Save Changes
                        </button>

                        <button type="button" class="logout_btn">
                            Logout
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </main>

    <footer>

        <div class="footer-content">
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms</a>

            <p>Copyright © 2026 Chip Chip Store</p>
        </div>

    </footer>

</body>

</html>
