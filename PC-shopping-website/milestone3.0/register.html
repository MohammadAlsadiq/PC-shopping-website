<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chip Chip Store</title>

    <link rel="stylesheet" href="css_files/style.css">
    <link rel="stylesheet" href="css_files/register.css">
</head>

<body>

<header class="navbar">

    <div class="navbar_left-side">

        <div class="navbar_logo">
            <img src="images/logo.png" class="logo" alt="Chip Chip Logo">
            <p id="storeName">Chip Chip</p>
        </div>

    </div>

</header>

<main>

    <div class="register_content">

        <div class="register_box">

            <h1>Create Account</h1>

            <p class="register_subtext">
                Join Chip Chip and start shopping!
            </p>

            <form class="register_form">

                <!-- First + Last Name -->
                <div class="name_row">

                    <div class="input_group">
                        <label>First Name</label>
                        <input type="text" id="first_name" placeholder="First name">
                        <small class="error"></small>
                    </div>

                    <div class="input_group">
                        <label>Last Name</label>
                        <input type="text" id="last_name" placeholder="Last name">
                        <small class="error"></small>
                    </div>

                </div>

                <!-- Email -->
                <div class="input_group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                    <small class="error"></small>
                </div>

                <!-- Password -->
                <div class="input_group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                    <small class="error"></small>
                </div>

                <!-- Confirm Password -->
                <div class="input_group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm_password" placeholder="Confirm your password">
                    <small class="error"></small>
                </div>

                <button type="submit" class="register_btn">Register</button>

                <p class="login_link">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

            </form>

        </div>

    </div>

</main>

<footer>

    <div class="footer-content">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms</a>
        <p>Copyright © 2026 Chip Chip Store</p>
    </div>

</footer>

<script>

const firstName = document.getElementById("first_name");
const lastName = document.getElementById("last_name");
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirm_password");
const form = document.querySelector(".register_form");

const lettersOnly = /^[A-Za-z]+$/;

/* ---------- helpers ---------- */
function setError(input, message){
    const parent = input.parentElement;
    const error = parent.querySelector("small");

    error.innerText = message;
    input.classList.add("error_input");
    input.classList.remove("valid_input");
}

function setSuccess(input){
    const parent = input.parentElement;
    const error = parent.querySelector("small");

    error.innerText = "";
    input.classList.remove("error_input");
    input.classList.add("valid_input");
}

/* ---------- live validation ---------- */

/* First name */
firstName.addEventListener("input", function(){
    if(!lettersOnly.test(firstName.value.trim())){
        setError(firstName, "Only letters allowed");
    } else {
        setSuccess(firstName);
    }
});

/* Last name */
lastName.addEventListener("input", function(){
    if(!lettersOnly.test(lastName.value.trim())){
        setError(lastName, "Only letters allowed");
    } else {
        setSuccess(lastName);
    }
});

/* Password */
password.addEventListener("input", function(){
    if(password.value.length < 8){
        setError(password, "Minimum 8 characters required");
    } else {
        setSuccess(password);
    }
});

/* Confirm password */
confirmPassword.addEventListener("input", function(){
    if(confirmPassword.value !== password.value){
        setError(confirmPassword, "Passwords do not match");
    } else {
        setSuccess(confirmPassword);
    }
});

/* Final check on submit */
form.addEventListener("submit", function(e){

    let valid = true;

    if(!lettersOnly.test(firstName.value.trim())){
        setError(firstName, "Only letters allowed");
        valid = false;
    }

    if(!lettersOnly.test(lastName.value.trim())){
        setError(lastName, "Only letters allowed");
        valid = false;
    }

    if(password.value.length < 8){
        setError(password, "Minimum 8 characters required");
        valid = false;
    }

    if(confirmPassword.value !== password.value){
        setError(confirmPassword, "Passwords do not match");
        valid = false;
    }

    if(!valid){
        e.preventDefault();
    }

});

</script>


</body>

</html>
