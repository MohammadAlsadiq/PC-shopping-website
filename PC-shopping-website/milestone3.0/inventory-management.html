<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Inventory Management | ChipShip</title>
    <link rel="stylesheet" href="css_files/style.css">
    <link rel="stylesheet" href="css_files/inventory-management.css">
</head>

<body>

    <header class="navbar page-header">

        <div class="navbar_logo">
            <img src="images/logo.png" class="logo" alt="ChipShip logo">
            <p id="storeName">ChipShip</p>
        </div>

        <a href="admin-dashboard.html" class="back-button" aria-label="Back to admin dashboard">&#8594;</a>

    </header>

    <main>
        <section class="inventory-section">

            <div class="inventory-title-area">
                <h1>Inventory Management</h1>
            </div>

            <div class="inventory-controls">

                <div class="control-group search-group">
                    <label for="searchInput">Search Item</label>
                    <input type="text" id="searchInput" placeholder="Search by item name..." autocomplete="off">
                </div>

                <div class="control-group">
                    <label for="categoryFilter">Category</label>
                    <select id="categoryFilter">
                        <!-- categories will be added by JS -->
                    </select>
                </div>

                <div class="control-group">
                    <label for="sortFilter">Sort</label>
                    <select id="sortFilter">
                        <option value="default">Default</option>
                        <option value="price-low-high">Price: Low to High</option>
                        <option value="price-high-low">Price: High to Low</option>
                        <option value="stock-high-low">Availability: In Stock First</option>
                        <option value="stock-low-high">Availability: Low Stock First</option>
                        <option value="out-of-stock">Out of Stock Only</option>
                    </select>
                </div>

                <div class="button-group">
                    <button type="button" id="refreshButton" class="control-button refresh-button">Refresh</button>
                    <button type="button" id="addItemButton" class="control-button add-button">Add Item</button>
                    <button type="button" id="deleteItemButton" class="control-button delete-button">Delete
                        Item</button>
                    <button type="button" id="modifyItemButton" class="control-button modify-button">Modify
                        Item</button>
                </div>

            </div>

            <div class="inventory-status" id="inventoryStatus">
                Loading inventory...
            </div>

            <div class="inventory-table-container">
                <table class="inventory-table">
                    <caption>Inventory items from the store database</caption>

                    <thead>
                        <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Name</th>
                            <th scope="col">Stored Units</th>
                            <th scope="col">Category</th>
                            <th scope="col">Price</th>
                            <th scope="col">Availability</th>
                        </tr>
                    </thead>

                    <tbody id="inventoryTableBody">
                        <tr>
                            <td colspan="6">Loading inventory...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </section>
    </main>

    <div class="modal-overlay" id="itemModal">
        <div class="modal-box">
            <button type="button" class="modal-close-button" id="closeModalButton">&times;</button>

            <h2 id="modalTitle">Item Action</h2>

            <div id="modalContent">
                <!-- popup content will be added by JS -->
            </div>
        </div>
    </div>

    <footer>

    </footer>

    <script type="module" src="js_files/inventory-management.js"></script>

</body>

</html>
